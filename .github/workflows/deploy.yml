name: Deploy with cache-busting

on:
  push:
    branches: [ main ]   # apni actual default branch ka naam yahan confirm kar lena (main/master)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject build version (cache-buster)
        run: |
          BUILD_VERSION=$(date +%s)
          echo "Using build version: $BUILD_VERSION"
          sed -i "s/__BUILD_VERSION__/${BUILD_VERSION}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
